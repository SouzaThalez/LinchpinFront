<div class="page">
    <div class="report-detail-list">
        <div class="nodata" *ngIf="cleaningData?.length == 0">
            <span>no data</span>
        </div>
        <h3>Achados de simulador durante a limpeza</h3>
        <div class="report-detail-container" 
             *ngFor="let element of cleaningData">
              <div class="report-content">
                    <div class="report-body">
                        <div class="report-image">
                            <img [src]="element.simulatorImage" alt="">
                        </div>
                        <div class="report-info">
                            <span>Title: {{element.simulatorName}}</span>
                            <span>Data: {{element.date}}</span>
                            <span>Status: Enviado para manutenção</span>
                            <div class="report-button">
                                <span>Chamado em aberto</span>
                            </div>
                        </div>
                    </div>
              </div>
              <div class="report-content">
                <div class="report-content-header">
                    <span>Registro:</span>
                    <span class="report-code">Código: {{element.simulatorCode}}</span>
                </div>
                <div class="report-content-body">
                    <span>{{element.findings}}</span>
                </div>
                <div class="report-content-footer">
                    <div class="link-description" (click)="openPreviewReportDialog(element)">
                        <span>Imprimir...</span>
                    </div>
                    <span class="material-symbols-outlined">visibility</span>
                </div>
              </div>
        </div>
    </div>
</div>
