
<div class="page">
    <div class="report-detail-list">
        <div class="report-detail-container" 
             *ngFor="let element of lessonReportData">
              <div class="report-content">
                    <div class="report-body">
                        <div class="report-image">
                            <img src="assets/images/logo/lowSimulators/pelves/enemaPelve.png" alt="">
                        </div>
                        <div class="report-info">
                            <span>Nome: {{element.lessonCategory}} - {{element.lessonType}}</span>
                            <span>Aula: {{element.name}} </span>
                            <span>Status: Enviado para manutenção</span>
                                    
                        </div>
                    </div>
              </div>
              <div class="report-content">
                <div class="report-content-header">
                    <span>Registro:</span>
                    <span class="report-code">Código: e3ghBH</span>
                </div>
                <div class="report-content-body">
                    <span>{{element.lessonOcorrance}}</span>
                </div>
                <div class="report-content-footer">
                    <span>Saber mais...</span>
                </div>
              </div>
        </div>
    </div>
</div>
