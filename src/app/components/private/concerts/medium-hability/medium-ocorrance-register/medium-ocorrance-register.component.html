<div class="page">
    <div class="report-detail-list">
        <div class="report-detail-container" 
             *ngFor="let element of lessonData">
              <div class="report-content">
                    <div class="report-body">
                        <div class="report-image">
                            <img [src]="element.lessonImage" alt="">
                        </div>
                        <div class="report-info">
                            <span>Nome: {{element.lessonCategory}}</span>
                            <span>Data abertura: {{element.date}}</span>
                            <span>Aula: {{element.name}}</span>
                            <span>Status:</span>
                        </div>
                    </div>
              </div>

              <div class="report-content">
                <div class="report-content-header">
                    <span>Registro:</span>
                    <span class="report-code">Código: {{element.simulatorCode}}</span>
                </div>
                <div class="report-content-body">
                    <span>{{element.simulatorOcorrance}}</span>
                </div>
                <div class="report-content-footer">
                    <div class="link-description" (click)="openPreviewReportDialog(element)">
                        <span>Imprimir...</span>
                    </div>
                    <span class="material-symbols-outlined">visibility</span>
                </div>
              </div>



        </div>
    </div>
</div>
