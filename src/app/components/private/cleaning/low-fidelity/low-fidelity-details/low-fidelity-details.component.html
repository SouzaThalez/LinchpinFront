<div class="page">
    <nav aria-label="breadcrumb" class="breadcrumb-nav">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a routerLink="../../Habilidade"> Habilidades </a></li>
            <li class="breadcrumb-item active" aria-current="page"><a>{{routeName}}</a></li>
        </ol>
    </nav>
    <div class="details-list" *ngIf="isLoading">
        <div class="card-container" *ngFor="let simulator of lowSimulators">
            <div class="card-head">
                <div class="card-image">
                    <img [src]="simulator.image" alt="">
                </div>
                <div class="card-description">
                    <span>{{simulator.name}}</span>
                    <span>{{simulator.description}}</span>
                    <span>Quantidade: {{simulator.codes.length}}</span>
                </div>
            </div>
            <div class="register-container">
                <span class="register-btn">btn span</span>
            </div>
        </div> 
    </div>
</div>
