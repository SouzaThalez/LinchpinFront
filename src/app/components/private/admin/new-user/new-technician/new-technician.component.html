<div class="page">
    <div class="page-header">
        <div class="grid-button-container">
            <div class="grid-item">
              
            </div>
            <div class="grid-item">
              <button mat-raised-button class="form-options form-buttons" (click)="openAddNewUserDialog()"> + Novo usuário Técnico</button>
            </div>
     
        </div>
    </div>
    
    <div class="page-body">
        <p></p>
        <div class="details-list">
            <div class="card-container" 
                 *ngFor="let user of tecnicalUsers">
                <div class="card-body">
                  <div class="card-head">
                    <div class="card-image">
                      <img src="assets/images/logo/th-logo.png" alt="lesson image">
                    </div>
                    <div class="card-description">
                      <span>Usuário: {{user.name}}</span>
                      <span>Tipo: {{user.role}}</span>
                      <span>E-mail: {{user.email}}</span>
                    </div>
                  </div>
                </div>
            </div>
        </div>
    </div>
</div>
