<div class="page">
    <div class="page-header-description">
        <span>Informações do seu  perfil</span>
    </div>
 
    <div class="page-body">

        <div class="page-row" [formGroup]="userForm">
            <div class="form-field">
                <mat-form-field  appearance="outline">
                    <mat-label>Editar login</mat-label>
                    <input matInput formControlName="login" placeholder="Ex. paulo.vieira">
                  </mat-form-field>
            </div>
            <div class="form-field">
                <mat-form-field  appearance="outline">
                    <mat-label>Editar nome </mat-label>
                    <input matInput formControlName="name" placeholder="Ex. Paulo">
                  </mat-form-field>
            </div>
            <div class="form-field-email">
                <mat-form-field  appearance="outline">
                    <mat-label>Editar e-mail </mat-label>
                    <input matInput formControlName="email" placeholder="email.profissional">
                  </mat-form-field>
            </div>
        </div>

        <div class="page-confirm">
            <div class="user-info">
                <button mat-raised-button (click)="submitUserForm()">Alterar login</button>
            </div>
        </div>

        <div class="page-row">
            <div class="user-info">
                <div class="page-title">Alterar senha</div>
                <div class="password-forms"  [formGroup]="userPasswordForm">
                    <div class="form-field">
                        <mat-form-field appearance="outline">
                            <mat-label>Nova senha</mat-label>
                            <input matInput formControlName="password" [type]="isShowing() ? 'password' : 'text'" />
                            <button
                              mat-icon-button
                              matSuffix
                              (click)="clickEvent($event)"
                              [attr.aria-label]="'Hide password'"
                              [attr.aria-pressed]="isShowing()"
                            >
                              <mat-icon>{{hide() ? 'visibility_off' : 'visibility'}}</mat-icon>
                            </button>
                        </mat-form-field>
                    </div>
                    <div class="form-field">
                        <mat-form-field appearance="outline">
                            <mat-label>Confirmar senha</mat-label>
                            <input matInput formControlName="confirmPassword" [type]="hide() ? 'password' : 'text'" />
                            <button
                              mat-icon-button
                              matSuffix
                              (click)="clickEventOne($event)"
                              [attr.aria-label]="'Hide password'"
                              [attr.aria-pressed]="hide()"
                            >
                              <mat-icon>{{hide() ? 'visibility_off' : 'visibility'}}</mat-icon>
                            </button>
                          </mat-form-field>
                    </div>
                </div>
                
            </div>
        </div>

        <div class="page-confirm">
            <button mat-raised-button (click)="submitPasswordForm()">Alterar senha</button>
        </div>

        <div class="page-row">  
            <div class="user-info">
                <div class="page-title">Tipo de usuário</div>
                <mat-card appearance="outlined">
                    <mat-card-content>{{currentUser?.role}} da simulação</mat-card-content>
                </mat-card>
                
            </div>
        </div>
    </div>
</div>
