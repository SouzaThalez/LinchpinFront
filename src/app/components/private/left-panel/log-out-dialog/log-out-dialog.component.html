
<h2 mat-dialog-title class="print-title">Log Off</h2>

<mat-dialog-content class="mat-typography print-text">
    <p>Tem certeza que deseja sair da Aplicação?</p>
</mat-dialog-content>

<mat-dialog-actions class="form-footer print-btns">
    <button class="print-btn no-btn" (click)="onClose(no)">Não</button>
    <button class="print-btn yes-btn" (click)="onClose(yes)">Sim</button>
</mat-dialog-actions>
