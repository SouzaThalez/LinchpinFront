<div class="page">
    <div class="add-item-container">
        <div class="add-item">
            <span class="add-text">Adicionar </span>
            <span class="material-symbols-outlined">add_circle</span>
        </div>
    </div>
    <div class="cards-list">
        <div class="card" 
             *ngFor="let element of cardType index as i"
             routerLink="/private/ocorrences/Habilidade/treinamentos/{{i}}">
                <div class="card-head">
                    <div class="card-description">
                        <span class="card-title">{{ element.name }}</span>
                        <span class="card-value">{{ element.value }}</span>
                    </div>
                </div>
                <div class="card-footer">
                    <span>Aulas: {{ element.quantity }}</span>
                </div>
        </div>
    </div>
</div>
