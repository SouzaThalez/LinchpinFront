<div class="page">
    <div class="cards-list">
        <div class="card" 
             *ngFor="let element of trainingLessons"
             routerLink="/private/ocorrences/Habilidade/treinamentos/{{element.id}}">
                <div class="card-head">
                    <div class="card-description">
                            <span class="card-title">{{ element.name }}</span>
                            <span class="card-value">{{ element.value }}</span>
                    </div>
                </div>
                <div class="card-footer">
                    <span>Guias: {{ element.lessons?.length }}</span>
                </div>
        </div>
    </div>
</div>
