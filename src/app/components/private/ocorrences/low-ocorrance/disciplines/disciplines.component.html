<div class="page">
    
    <div class="cards-list" *ngIf="disciplines">
        <div class="card" 
             *ngFor="let element of disciplines" 
             routerLink="/private/ocorrences/Habilidade/disciplinas/{{element.id}}">
            <div class="card-head">
                <div class="card-description">
                    <span class="card-title">{{element.name}}</span>
                    <span class="card-value">{{element.value}}</span>
                </div>
            </div>
            <div class="card-footer">
                <span>Aulas: {{element.quantity}}</span>
            </div>
        </div>
    </div>
    
</div>
