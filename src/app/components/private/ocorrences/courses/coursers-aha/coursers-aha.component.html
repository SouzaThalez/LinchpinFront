<div class="cards-list">
    <div class="card" 
         *ngFor="let element of courses"
         (click)="openCursesDialog(element)">
        <div class="card-head">
            <div class="card-description">
                <span class="card-title">Registro</span>
                <span class="card-value">{{element.label}}</span>
            </div>
        </div>
        <div class="card-footer">
            <span>{{element.name}} </span>
        </div>
    </div>
</div>
