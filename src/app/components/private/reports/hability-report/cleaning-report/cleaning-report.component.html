<div class="page">
    <h3>Listagem de todos os simuladores de baixa fidelidade que tiveram registro de limpeza</h3>
    <div class="date-form">
        <mat-form-field appearance="outline">
            <mat-label>Filtrar por periodo</mat-label>
            <mat-date-range-input [formGroup]="form" [rangePicker]="picker">
              <input matStartDate formControlName="start" placeholder="Start date">
              <input matEndDate formControlName="end" placeholder="End date">
            </mat-date-range-input>
         
            <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
            <mat-date-range-picker #picker></mat-date-range-picker>
        </mat-form-field>
    </div>
    <div class="report-container"
         *ngFor="let element of cleaningData"
         (click)="openPreviewLessonDialog(element)">
        <div class="report-head">
            <div class="report-icon">
                <img src="assets/icons/report-icon.png" alt="">
            </div>
            <div class="report-description">
                <span>Simulador: {{element.simulatorName}}</span>
                <span>Limpeza: {{element.cleaningCategory}}</span>
                <span>Data: {{element.date}}</span>
                <span>Thales Carvalho</span>
            </div>
        </div>
        <div class="report-bars">
            <img src="assets/icons/report-bars.png" alt="">
        </div>
        <div class="report-grid">
            <img src="assets/icons/report-grid.png" alt="">
        </div>
    </div>
</div>
