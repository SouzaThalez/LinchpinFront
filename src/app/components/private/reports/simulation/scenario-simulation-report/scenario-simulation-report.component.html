<div class="page">

    <div class="empty-report-data"  *ngIf="!scenarioReportsData || scenarioReportsData.length === 0">
        <span class="empty-default-message">Não existem registros no momento...</span>
    </div>

    <div class="report-container"
         *ngFor="let element of scenarioReportsData"
         (click)="openPreviewScenarioReport(element)">

        <div class="report-head">
            <div class="report-icon">
                <img src="assets/icons/report-icon.png" alt="">
            </div>
            <div class="report-description">
                <span>Registro: {{element.scenarioCategory}}</span>
                <span>Simulador: {{element.simulatorName}}</span>
                <span>Data:{{element.date}}</span>
                <span>Responsavél: </span>
            </div>
        </div>
        <div class="report-bars">
            <img src="assets/icons/report-bars.png" alt="">
        </div>
        <div class="report-grid">
            <img src="assets/icons/report-grid.png" alt="">
        </div>
        
    </div>
</div>
